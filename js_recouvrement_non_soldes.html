<script>
window.renderNonSoldesView = function(dataSet) {
    currentFilteredDataGlobal = dataSet;

    let totalReste = 0, countChequeImpaye = 0, countChequeCaution = 0;
    const aggEnt = {}, aggOrg = {};

    dataSet.forEach(d => {
        totalReste += d.reste || 0;
        let imp = String(d.chqImpaye||"").trim().toUpperCase();
        let cau = String(d.chqCaution||"").trim().toUpperCase();
        if (imp !== "" && imp !== "NON" && imp !== "0") countChequeImpaye++;
        if (cau !== "" && cau !== "NON" && cau !== "0") countChequeCaution++;

        aggEnt[d.entite] = (aggEnt[d.entite]||0) + (d.reste || 0);
        aggOrg[d.organisme] = (aggOrg[d.organisme]||0) + (d.reste || 0);
    });

    safeSetText('kpiRecouvMontant', formatMoney(totalReste) + ' DH');
    safeSetText('kpiRecouvCount', dataSet.length);

    const sortEnt = Object.entries(aggEnt).sort((a,b)=>b[1]-a[1]).slice(0,3);
    safeSetHTML('kpiRecouvTopEntities', sortEnt.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${i[0]}</span><strong>${formatMoney(i[1])}</strong></div>`).join('') || 'Aucune donnée');

    const sortOrg = Object.entries(aggOrg).sort((a,b)=>b[1]-a[1]).slice(0,3);
    safeSetHTML('kpiRecouvTopOrgList', sortOrg.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100px;">${i[0]}</span><strong>${formatMoney(i[1])}</strong></div>`).join('') || 'Aucune donnée');

    // --- CORRECTION : Mise à jour des valeurs sans écraser le HTML ---
    safeSetText('kpiChqImpayeCount', countChequeImpaye);
    safeSetText('kpiChqCautionCount', countChequeCaution);

    // Masque la carte variable
    const cardVar = document.getElementById('cardVariable');
    if(cardVar) cardVar.style.display = 'none';

    if(typeof drawRecouvCharts === 'function') drawRecouvCharts(dataSet);
    if(typeof renderClassificationService === 'function') renderClassificationService(dataSet);
    if(typeof renderClassificationEtat === 'function') renderClassificationEtat(dataSet);
    
    if (recouvTableMode === 'LIST') {
        if(typeof renderNonSoldesListTable === 'function') renderNonSoldesListTable(dataSet);
    } else {
        if(typeof renderBalanceTable === 'function') renderBalanceTable(dataSet);
    }
};

window.renderClassificationService = function(dataSet) {
    const tbody = document.querySelector('#tableRecouvOrg tbody'); 
    if(!tbody) return; tbody.innerHTML = '';
    
    document.querySelector('#blockClassifOrg h4').textContent = "Analyse par Service";
    document.querySelector('#recouvPieBlock h4').textContent = "Répartition par Service";

    const counts = {}; const amounts = {};
    dataSet.forEach(d => {
        let srv = d.service || "Non défini";
        counts[srv] = (counts[srv]||0)+1; amounts[srv] = (amounts[srv]||0)+(d.reste||0);
    });
    
    const total = dataSet.reduce((s,d)=>s+(d.reste||0),0);
    Object.entries(amounts).sort((a,b) => b[1] - a[1]).forEach(i => { 
        const p = total > 0 ? (i[1]/total*100).toFixed(0) : 0; 
        tbody.insertAdjacentHTML('beforeend', `<tr onclick="openRecouvDetailCustom(currentFilteredDataGlobal.filter(d=>d.service==='${i[0].replace(/'/g, "\\'")}'), 'Service ${i[0].replace(/'/g, "\\'")}')" style="cursor:pointer;"><td style="text-align:left;">${i[0]}</td><td style="text-align:center;">${counts[i[0]]}</td><td style="text-align:right; font-weight:bold;">${formatMoney(i[1])}</td><td style="text-align:right;">${p}%</td></tr>`); 
    });
};

window.renderClassificationEtat = function(dataSet) {
    const tbody = document.querySelector('#tableRecouvNature tbody'); 
    if(!tbody) return; tbody.innerHTML = '';
    
    const h4Nat = document.querySelector('#blockClassifNature h4');
    if(h4Nat) h4Nat.textContent = "Analyse par État de Dossier";
    
    // CORRECTION ICI : On cible l'intérieur du conteneur du graphique, plus le "nextElementSibling"
    const h4NatPie = document.querySelector('#blockClassifNature .chart-container h4');
    if(h4NatPie) h4NatPie.textContent = "Répartition par État";

    const counts = {}; const amounts = {};
    dataSet.forEach(d => {
        let etat = d.etatDossier || "Non défini";
        counts[etat] = (counts[etat]||0)+1; amounts[etat] = (amounts[etat]||0)+(d.reste||0);
    });
    
    const total = dataSet.reduce((s,d)=>s+(d.reste||0),0);
    Object.entries(amounts).sort((a,b) => b[1] - a[1]).forEach(i => { 
        const p = total > 0 ? (i[1]/total*100).toFixed(0) : 0; 
        tbody.insertAdjacentHTML('beforeend', `<tr onclick="openRecouvDetailCustom(currentFilteredDataGlobal.filter(d=>d.etatDossier==='${i[0].replace(/'/g, "\\'")}'), 'État ${i[0].replace(/'/g, "\\'")}')" style="cursor:pointer;"><td style="text-align:left;">${i[0]}</td><td style="text-align:center;">${counts[i[0]]}</td><td style="text-align:right; font-weight:bold;">${formatMoney(i[1])}</td><td style="text-align:right;">${p}%</td></tr>`); 
    });
    if(typeof drawNatureChart === 'function') drawNatureChart(amounts);
};

window.renderNonSoldesListTable = function(dataSet) {
    const tbody = document.querySelector('#tableTopFactures tbody');
    const thead = document.querySelector('#tableTopFactures thead tr');
    if(!tbody || !thead) return;

    thead.innerHTML = `<th style="text-align:left; padding:12px;">Entité</th><th style="text-align:left; padding:12px;">Dossier / Patient</th><th style="text-align:left; padding:12px;">Service</th><th style="text-align:center; padding:12px;">Date Sortie</th><th style="text-align:left; padding:12px;">Organisme</th><th style="text-align:right; padding:12px;">Tot. Patient</th><th style="text-align:right; padding:12px;">Payé</th><th style="text-align:right; color:#c0392b; padding:12px;">Reste</th><th style="text-align:center; padding:12px;">État</th>`;
    tbody.innerHTML = '';
    
    let sortedData = [...dataSet];
    if (recouvSortMode === 'MONTANT') sortedData.sort((a,b) => (b.reste||0) - (a.reste||0));
    const limit = (recouvTopN === 1000) ? sortedData.length : recouvTopN;
    
    sortedData.slice(0, limit).forEach(d => {
        let alertIcon = (d.chqImpaye && d.chqImpaye !== "NON" && d.chqImpaye !== "0") ? ' <i class="fas fa-exclamation-triangle" style="color:#c0392b;" title="Chèque Impayé"></i>' : '';
        let cautionIcon = (d.chqCaution && d.chqCaution !== "NON" && d.chqCaution !== "0") ? ' <i class="fas fa-lock" style="color:#f39c12;" title="Chèque Caution"></i>' : '';
        
        tbody.insertAdjacentHTML('beforeend', `<tr style="border-bottom:1px solid #eee; cursor:pointer;" onclick="openRecouvDetailCustom([currentFilteredDataGlobal.find(x=>x.dossier=='${d.dossier}')], 'Dossier ${d.dossier}')"><td style="text-align:left;">${d.entite}</td><td style="text-align:left;"><b>${d.dossier}</b>${alertIcon}${cautionIcon}<br>${d.patient}</td><td style="text-align:left; font-size:0.9em;">${d.service}</td><td style="text-align:center;">${d.dateRefDisplay}</td><td style="text-align:left;">${d.organisme}</td><td style="text-align:right;">${formatMoney(d.totPatient)}</td><td style="text-align:right; color:#27ae60;">${formatMoney(d.totPaiement)}</td><td style="text-align:right; font-weight:bold; color:#c0392b;">${formatMoney(d.reste)}</td><td style="text-align:center; font-size:0.85em;">${d.etatDossier || '-'}</td></tr>`);
    });
};
</script>
