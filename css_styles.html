<style>
/* ============================================================ */
/*  DASHBOARD REGION GRAND-SUD — MODERN UI REDESIGN                */
/*  Palette: Indigo/Violet + Soft Neutrals                      */
/*  Font: Plus Jakarta Sans                                     */
/* ============================================================ */

@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');

* { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

:root {
  --bg-body: #f0f2f8;
  --bg-card: #ffffff;
  --bg-sidebar: #1a1d2e;
  --text-main: #1a1d2e;
  --text-sub: #6b7280;
  --text-light: #9ca3af;
  --border-color: #e5e7f0;
  --primary: #6366f1;
  --primary-light: #818cf8;
  --primary-dark: #4f46e5;
  --primary-bg: rgba(99, 102, 241, 0.08);
  --primary-bg-strong: rgba(99, 102, 241, 0.15);
  --accent-green: #10b981;
  --accent-red: #ef4444;
  --accent-orange: #f59e0b;
  --accent-cyan: #06b6d4;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.08);
  --shadow-card: 0 2px 12px rgba(99, 102, 241, 0.06);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 24px;
  --header-bg: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
  --shadow: var(--shadow-md);
  --accent: var(--primary);
}

body {
  font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif;
  margin: 0; padding: 0;
  background-color: var(--bg-body);
  color: var(--text-main);
  transition: background 0.3s, color 0.3s;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================ */
/*  HEADER                                                       */
/* ============================================================ */

header {
  background: var(--header-bg);
  color: white;
  padding: 0 24px;
  box-shadow: 0 4px 30px rgba(30, 27, 75, 0.3);
  display: flex; align-items: center; justify-content: space-between;
  height: 68px;
  position: relative; z-index: 100;
  backdrop-filter: blur(20px);
}

.header-left { display: flex; align-items: center; gap: 12px; }

h2 {
  margin: 0; font-size: 1.05em; font-weight: 800;
  letter-spacing: -0.3px; white-space: nowrap;
  text-transform: uppercase;
  background: linear-gradient(135deg, #e0e7ff, #a5b4fc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.header-center { display: flex; align-items: center; gap: 16px; flex: 1; }

.header-filters {
  display: flex; gap: 8px; align-items: center;
  background: rgba(255,255,255,0.08);
  padding: 5px 14px; border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.06);
}
.header-filters label { font-size: 0.7em; font-weight: 700; color: rgba(255,255,255,0.5); margin-right: 2px; }
.header-select {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: white; padding: 6px 12px;
  border-radius: 10px; font-size: 0.8em;
  outline: none; cursor: pointer; min-width: 80px;
  font-family: inherit; font-weight: 600;
  transition: all 0.2s;
}
.header-select:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); }
.header-select option { background: #1e1b4b; color: white; }

/* Nav Tabs - Pilule style */
.nav-tabs { display: flex; gap: 4px; margin-left: 16px; }
.nav-tab-btn {
  padding: 7px 16px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.55);
  font-weight: 700; font-size: 0.78em;
  border-radius: 10px; cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  font-family: inherit;
  white-space: nowrap;
}
.nav-tab-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); }
.nav-tab-btn.active {
  background: rgba(255,255,255,0.95);
  color: var(--primary-dark);
  box-shadow: 0 2px 10px rgba(255,255,255,0.15);
}
.nav-tab-btn i { margin-right: 5px; font-size: 0.85em; }

.header-right { display: flex; align-items: center; gap: 8px; }
.action-btn {
  background: rgba(255,255,255,0.08); border: none; cursor: pointer;
  padding: 8px; border-radius: 10px;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center;
}
.action-btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
.action-btn svg { width: 20px; height: 20px; fill: white; }

/* User profile widget */
.user-profile-widget {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.08);
  padding: 5px 14px 5px 5px;
  border-radius: 50px; cursor: default;
  border: 1px solid rgba(255,255,255,0.06);
  transition: background 0.2s;
}
.user-profile-widget img {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  object-fit: cover;
}
.user-profile-info { display: flex; flex-direction: column; line-height: 1.2; }
.user-profile-info span:first-child { font-size: 0.78em; font-weight: 700; color: #e0e7ff; text-transform: capitalize; }
.user-profile-info span:last-child { font-size: 0.62em; color: rgba(255,255,255,0.4); font-weight: 500; }

/* ============================================================ */
/*  LAYOUT                                                       */
/* ============================================================ */

.app-layout { display: flex; width: 100%; min-height: calc(100vh - 68px); transition: all 0.3s; }

#sidebar {
  width: 250px;
  background: var(--bg-card);
  display: flex; flex-direction: column; flex-shrink: 0;
  height: calc(100vh - 68px);
  border-right: 1px solid var(--border-color);
  box-shadow: 2px 0 20px rgba(0,0,0,0.03);
}
.app-layout.collapsed #sidebar { width: 0; overflow: hidden; }

#sidebarProfile {
  padding: 20px 18px 12px 18px;
  background: linear-gradient(180deg, var(--primary-bg) 0%, transparent 100%);
  border-bottom: 1px solid var(--border-color);
}
.sb-profile-group { margin-bottom: 12px; }
.sb-label {
  font-size: 0.65em; color: var(--primary);
  text-transform: uppercase; font-weight: 800;
  margin-bottom: 3px; letter-spacing: 0.8px;
}
.sb-value { font-size: 0.9em; color: var(--text-main); font-weight: 700; word-break: break-word; }

#familyContainer { padding: 18px; overflow-y: auto; flex-grow: 1; }
#familyContainer h3 {
  margin-top: 0; color: var(--text-light);
  font-size: 0.7em; text-transform: uppercase;
  margin-bottom: 14px; letter-spacing: 1.5px;
  font-weight: 800;
}
#familyButtons button {
  display: block; width: 100%;
  margin-bottom: 4px; padding: 11px 14px;
  background: transparent;
  color: var(--text-sub);
  border: none; border-radius: var(--radius-sm);
  text-align: left; cursor: pointer;
  font-weight: 600; transition: all 0.2s;
  font-size: 0.85em; font-family: inherit;
  position: relative;
}
#familyButtons button:hover:not(.active) {
  background: var(--primary-bg);
  color: var(--primary);
  padding-left: 18px;
}
#familyButtons button.active {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
  font-weight: 700;
}

/* ============================================================ */
/*  MAIN CONTENT                                                 */
/* ============================================================ */

.main-content {
  flex-grow: 1; padding: 24px;
  overflow-y: auto; position: relative;
  height: calc(100vh - 68px);
}
.view-section { display: none; }
.view-section.active { display: block; }

/* ============================================================ */
/*  INFO BAR                                                     */
/* ============================================================ */

#infoBar {
  background: var(--bg-card);
  padding: 18px 22px; margin-bottom: 20px;
  border-radius: var(--radius-lg);
  border-left: 4px solid var(--primary);
  box-shadow: var(--shadow-card);
  display: flex; justify-content: space-between; align-items: center;
  min-height: 75px;
}
.ctx-container { display: flex; flex-direction: column; }
.ctx-main { font-size: 1.3em; font-weight: 900; color: var(--text-main); line-height: 1.2; }
.ctx-sub { font-size: 0.85em; color: var(--text-sub); font-weight: 500; display: flex; align-items: center; gap: 8px; }
.ctx-badge { background: var(--primary-bg-strong); color: var(--primary); padding: 3px 10px; border-radius: 6px; font-size: 0.8em; font-weight: 700; }

#headerMetrics { display: flex; gap: 16px; align-items: center; }
.metric-pill {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg-card); border: 1px solid var(--border-color);
  padding: 10px 18px; border-radius: 50px;
  transition: all 0.25s; cursor: pointer;
  box-shadow: var(--shadow-sm);
}
.metric-pill:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--primary-light); }
.metric-icon {
  width: 38px; height: 38px;
  background: var(--primary-bg);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
}
.metric-icon svg { width: 20px; height: 20px; fill: currentColor; }
.metric-info { display: flex; flex-direction: column; line-height: 1.1; }
.metric-val { font-size: 1.3em; font-weight: 900; color: var(--text-main); }
.metric-lbl { font-size: 0.7em; text-transform: uppercase; color: var(--text-light); font-weight: 700; letter-spacing: 0.5px; }
.metric-period { font-size: 0.65em; color: var(--text-light); font-weight: 600; margin-top: 2px; }
.metric-val.alert { color: var(--accent-red); }
.metric-val.good { color: var(--accent-green); }
.capacity-warning {
  position: absolute; top: -5px; right: -5px;
  background: var(--accent-cyan); color: white;
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(6, 182, 212, 0.4);
  animation: pulse 2s infinite;
}
.capacity-warning svg { width: 12px; height: 12px; fill: white; }
@keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

/* ============================================================ */
/*  KPI PANELS (Flash)                                           */
/* ============================================================ */

#kpiPanel {
  background: var(--bg-card);
  padding: 16px; margin-bottom: 20px;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  display: flex; flex-direction: column; gap: 12px;
}
.kpi-row { display: flex; gap: 12px; flex-wrap: wrap; width: 100%; }
.kpi-box {
  flex: 1; min-width: 180px; text-align: center;
  border-right: 1px solid var(--border-color);
  padding: 8px 10px; position: relative;
  display: flex; flex-direction: column; justify-content: center;
}
.kpi-box:last-child { border-right: none; }
.kpi-label { font-size: 0.65em; color: var(--text-light); font-weight: 700; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
.kpi-main-val { display: flex; align-items: baseline; justify-content: center; gap: 8px; }
.kpi-value { font-size: 1.5em; font-weight: 900; color: var(--text-main); line-height: 1.1; }
.evolution-tag { font-size: 0.65em; font-weight: 800; padding: 3px 8px; border-radius: 6px; vertical-align: middle; }
.evolution-tag.pos { color: var(--accent-green); background: rgba(16, 185, 129, 0.1); }
.evolution-tag.neg { color: var(--accent-red); background: rgba(239, 68, 68, 0.1); }
.kpi-value.green { color: var(--accent-green); }
.kpi-value.red { color: var(--accent-red); }
.kpi-sub-container { margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--border-color); display: none; flex-direction: column; gap: 6px; }
.kpi-sub-row { display: flex; align-items: center; justify-content: space-between; padding: 0 10px; }
.kpi-sub-label { font-size: 0.7em; color: var(--text-light); font-weight: 700; text-transform: uppercase; width: 40px; text-align: left; }
.kpi-sub-data { display: flex; align-items: baseline; gap: 8px; justify-content: flex-end; flex-grow: 1; }
.kpi-sub-val { font-size: 1.3em; font-weight: 800; color: var(--primary); line-height: 1; }

/* ============================================================ */
/*  FOCUS PANELS (Flash detail cards)                            */
/* ============================================================ */

.focus-panel-container { display: none; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.focus-panel-column { display: none; flex-direction: column; gap: 16px; margin-bottom: 20px; }
.focus-row { display: flex; gap: 16px; flex-wrap: wrap; width: 100%; }
.focus-box {
  flex: 1; min-width: 180px;
  border-radius: var(--radius-md); color: white;
  box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  display: flex; flex-direction: column; overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.focus-box:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.18); }
.focus-content { padding: 16px; flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.focus-label { font-size: 0.78em; opacity: 0.9; margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.focus-value { font-size: 1.8em; font-weight: 900; text-shadow: 0 2px 4px rgba(0,0,0,0.15); }
.focus-footer { background: rgba(0, 0, 0, 0.12); padding: 8px 10px; display: flex; justify-content: center; gap: 10px; align-items: center; font-size: 0.8em; font-weight: 600; }

/* Gradients */
.bg-bloc { background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%); }
.bg-bloc-sec { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
.bg-chimio { background: linear-gradient(135deg, #059669 0%, #34d399 100%); }
.bg-chimio-sec { background: linear-gradient(135deg, #10b981 0%, #6ee7b7 100%); }
.bg-radio { background: linear-gradient(135deg, #e11d48 0%, #f43f5e 100%); }
.bg-radio-sec { background: linear-gradient(135deg, #dc2626 0%, #f97316 100%); }
.bg-cathe { background: linear-gradient(135deg, #7f1d1d 0%, #b91c1c 100%); }
.bg-cathe-sec { background: linear-gradient(135deg, #991b1b 0%, #dc2626 100%); }
.bg-imagerie { background: linear-gradient(135deg, #0d9488 0%, #2dd4bf 100%); }
.bg-imagerie-2 { background: linear-gradient(135deg, #0891b2 0%, #67e8f9 100%); }
.bg-labo { background: linear-gradient(135deg, #7e22ce 0%, #c084fc 100%); }
.bg-labo-2 { background: linear-gradient(135deg, #4338ca 0%, #6366f1 100%); }
.bg-nucleaire { background: linear-gradient(135deg, #a21caf 0%, #d946ef 100%); }
.bg-nucleaire-2 { background: linear-gradient(135deg, #9333ea 0%, #e879f9 100%); }
.bg-consult { background: linear-gradient(135deg, #0891b2 0%, #22d3ee 100%); }
.bg-dialyse { background: linear-gradient(135deg, #06b6d4 0%, #a7f3d0 100%); color: #064e3b !important; }
.bg-dialyse .focus-value { color: #064e3b; text-shadow: none; }
.bg-dialyse-sec { background: linear-gradient(135deg, #0ea5e9 0%, #67e8f9 100%); color: #0c4a6e !important; }
.bg-dialyse-sec .focus-value { color: #0c4a6e; text-shadow: none; }
.bg-hospit { background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); }
.bg-urgence { background: linear-gradient(135deg, #f97316 0%, #ef4444 100%); }
.bg-urgence-sec { background: linear-gradient(135deg, #ea580c 0%, #eab308 100%); }
.bg-jour { background: linear-gradient(135deg, #14b8a6 0%, #2563eb 100%); }

/* ============================================================ */
/*  CARDS & STAT CARDS                                           */
/* ============================================================ */

.cards-row { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.stat-card {
  flex: 1; min-width: 220px;
  background: var(--bg-card);
  padding: 20px; border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border-color);
  border-top: 4px solid var(--primary);
  position: relative;
  transition: transform 0.2s, box-shadow 0.2s;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.stat-card.budget { border-top-color: var(--accent-orange); }
.stat-card.taux { border-top-color: var(--accent-green); }
.stat-title { font-size: 0.72em; text-transform: uppercase; color: var(--text-light); font-weight: 800; margin-bottom: 8px; letter-spacing: 0.5px; }
.stat-value { font-size: 1.8em; font-weight: 900; color: var(--text-main); margin-bottom: 4px; }
.stat-sub { font-size: 0.8em; color: var(--text-sub); font-weight: 500; }

/* ============================================================ */
/*  TABLES                                                       */
/* ============================================================ */

.table-container {
  background: var(--bg-card);
  padding: 0; border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  border: 1px solid var(--border-color);
}
table { width: 100%; border-collapse: collapse; }
th {
  background-color: #f8f9fd;
  color: var(--text-light); font-weight: 800;
  text-transform: uppercase; font-size: 0.7em;
  padding: 14px 16px; text-align: right;
  border-bottom: 2px solid var(--border-color);
  letter-spacing: 0.3px;
}
th:first-child { text-align: left; }
td {
  padding: 13px 16px; font-size: 0.88em;
  border-bottom: 1px solid #f3f4f8;
  text-align: right; color: var(--text-main);
  font-weight: 500;
}
td:first-child { text-align: left; font-weight: 700; }
tbody tr { transition: background 0.15s; }
tbody tr:hover td { background-color: var(--primary-bg); }
.badge-perf { padding: 4px 10px; border-radius: 6px; font-weight: 800; font-size: 0.8em; }
.badge-perf.green { background: rgba(16, 185, 129, 0.12); color: var(--accent-green); }
.badge-perf.red { background: rgba(239, 68, 68, 0.12); color: var(--accent-red); }

/* ============================================================ */
/*  CHARTS                                                       */
/* ============================================================ */

#chartContainer {
  background: var(--bg-card);
  padding: 24px; border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  min-height: 480px; display: flex; gap: 24px;
  flex-wrap: wrap; align-items: stretch;
  border: 1px solid var(--border-color);
}
#mainChartWrapper { flex: 1; min-width: 300px; position: relative; }
#pieChartWrapper {
  display: none; width: 250px; flex-shrink: 0;
  background: #f8f9fd; border-left: 1px solid var(--border-color);
  padding-left: 20px; flex-direction: column;
  align-items: center; justify-content: center;
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
}
.chart-container {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border-color);
}

/* ============================================================ */
/*  SECONDARY FILTERS                                            */
/* ============================================================ */

#secondaryFiltersPanel {
  background: var(--bg-card);
  padding: 14px 18px; margin-bottom: 20px;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end;
  border: 1px solid var(--border-color);
}
.sec-filter-group { display: flex; flex-direction: column; flex: 1; min-width: 130px; }
.sec-filter-group label { font-weight: 700; font-size: 0.72em; margin-bottom: 4px; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; }
.sec-filter-group select {
  padding: 9px 12px; border: 1px solid var(--border-color);
  border-radius: var(--radius-sm); background: #f8f9fd;
  color: var(--text-main); font-size: 0.85em;
  outline: none; width: 100%; transition: border 0.2s;
  font-family: inherit; font-weight: 600;
}
.sec-filter-group select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }

/* ============================================================ */
/*  MODALS                                                       */
/* ============================================================ */

#historyModal {
  display: none; position: fixed; z-index: 2000;
  left: 0; top: 0; width: 100%; height: 100%;
  background-color: rgba(0,0,0,0.5);
  backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
}
.modal-content {
  background-color: var(--bg-card);
  padding: 28px; border-radius: var(--radius-xl);
  width: 80%; max-width: 800px;
  position: relative;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);
}
.close-modal { position: absolute; top: 16px; right: 20px; color: var(--text-light); font-size: 28px; font-weight: bold; cursor: pointer; }
.close-modal:hover { color: var(--text-main); }
#modalTitle { margin-top: 0; color: var(--primary); font-size: 1.15em; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; margin-bottom: 10px; font-weight: 800; }
#modalSubtitle { margin: 0 0 20px 0; font-size: 1em; color: var(--text-sub); font-weight: 600; text-align: center; }

/* ============================================================ */
/*  LOADING & PRINT                                              */
/* ============================================================ */

#loadingOverlay {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(15, 23, 42, 0.9);
  z-index: 9999; flex-direction: column;
  align-items: center; justify-content: center; color: white;
  backdrop-filter: blur(10px);
}
.loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary-light); border-radius: 50%; width: 44px; height: 44px; animation: spin 0.8s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

#printHeader { display: none; width: 100%; margin-bottom: 15px; border-bottom: 3px solid var(--primary); padding-bottom: 10px; flex-direction: row; justify-content: space-between; align-items: flex-end; background: white; }
.print-col-left h1 { margin: 0; color: var(--primary); font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
.print-col-right { text-align: right; }
.print-family-tag { font-size: 20px; font-weight: bold; color: #444; text-transform: uppercase; margin-bottom: 2px; }
