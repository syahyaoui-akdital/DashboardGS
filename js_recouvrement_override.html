/* ============================================================ */
/* 4. POST-RENDER FIXES (charts + management)                    */
/* ============================================================ */
function postRenderFixes() {
  // Management row
  var ex = document.getElementById('recouvMgmtRow'); if (ex) ex.remove();
  var titleEl = document.getElementById('recouvMainTitle'); if (!titleEl) return;
  var parent = titleEl.parentElement;
  var resp = document.getElementById('recouvResp'), dir = document.getElementById('recouvDirMed');
  var row = document.createElement('div'); row.id = 'recouvMgmtRow'; row.className = 'recouv-mgmt-row';
  row.innerHTML = '<div class="recouv-mgmt-item"><i class="fas fa-user-tie" style="color:#6366f1;margin-right:4px;"></i>Resp: <strong>' + (resp ? resp.textContent : '--') + '</strong></div><div class="recouv-mgmt-item"><i class="fas fa-stethoscope" style="color:#6366f1;margin-right:4px;"></i>Dir. Med: <strong>' + (dir ? dir.textContent : '--') + '</strong></div>';
  parent.appendChild(row);
  // Force hide filters
  ['filterApprocheContainer', 'filterPatientContainer'].forEach(function(id) { var el = document.getElementById(id); if (el) el.setAttribute('style', 'display:none!important'); });
  // Modernize charts
  modernizeRecouvCharts();
}

function modernizeRecouvCharts() {
  var dk = document.body.classList.contains('dark-mode');
  var FJ = "'Plus Jakarta Sans',sans-serif";
  if (window.recouvChartBarInstance) {
    try {
      var ch = window.recouvChartBarInstance, ct = ch.ctx;
      var gV = ct.createLinearGradient(0, 0, 0, 400); gV.addColorStop(0, '#6366f1'); gV.addColorStop(1, '#a78bfa');
      ch.data.datasets.forEach(function(ds) {
        ds.borderRadius = 10; ds.borderSkipped = false;
        if (Array.isArray(ds.backgroundColor)) { ds.backgroundColor = ds.backgroundColor.map(function(c, i) { return window.REC_COLORS[i % window.REC_COLORS.length]; }); }
        else { ds.backgroundColor = gV; }
      });
      if (ch.options.scales.y) ch.options.scales.y.display = false;
      if (ch.options.scales.x) { ch.options.scales.x.grid = { display: false }; ch.options.scales.x.border = { display: false }; ch.options.scales.x.ticks = { color: dk ? '#64748b' : '#94a3b8', font: { size: 11, weight: '700', family: FJ }, padding: 8 }; }
      ch.options.plugins = ch.options.plugins || {};
      ch.options.plugins.legend = { display: false };
      if (ch.options.plugins.datalabels) { ch.options.plugins.datalabels.color = dk ? '#e2e8f0' : '#1e293b'; ch.options.plugins.datalabels.font = { weight: '800', size: 11, family: FJ }; }
      ch.options.layout = { padding: { top: 30, bottom: 5 } };
      ch.update();
    } catch (e) {}
  }
  if (window.recouvChartPieInstance) {
    try {
      var pc = window.recouvChartPieInstance;
      pc.data.datasets.forEach(function(ds) { ds.backgroundColor = window.REC_COLORS; ds.borderWidth = 3; ds.borderColor = dk ? '#0f1423' : '#fff'; });
      pc.options.plugins = pc.options.plugins || {};
      pc.options.plugins.legend = { position: 'bottom', labels: { usePointStyle: true, pointStyle: 'circle', padding: 12, color: dk ? '#94a3b8' : '#64748b', font: { size: 10, weight: '700', family: FJ } } };
      if (pc.options.plugins.datalabels) { pc.options.plugins.datalabels.color = '#fff'; pc.options.plugins.datalabels.font = { weight: '800', size: 12, family: FJ }; }
      pc.update();
    } catch (e) {}
  }
  if (window.natureChartPieInstance) {
    try { var nc = window.natureChartPieInstance; nc.data.datasets.forEach(function(ds) { ds.backgroundColor = window.REC_COLORS; ds.borderWidth = 3; ds.borderColor = dk ? '#0f1423' : '#fff'; }); nc.update(); } catch (e) {}
  }
}

window.switchRecouvSub = function(sub) {
  if (typeof switchFamily === 'function') switchFamily('Recouvrement', sub, null);

  document.querySelectorAll('.recouv-top-btn').forEach(function(b) { if (b.getAttribute('data-sub') === sub) b.classList.add('active'); });
};
