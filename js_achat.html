var globalAchatData=[];var globalAchatData2025=[];var globalAchatBudget=[];var globalBudgetApp=[];var globalConsoN1=[];var globalDataSage=[];var globalCodeArticle=[];
var currentAchatFiltered=[];var currentAchat2025Filtered=[];var currentBudgetFiltered=[];var currentSageFiltered=[];
var achatActiveTab='sage';var appChartMode='famille';var appTop10Mode='top10';var currentModalRows=[];var currentModalTitle="detail";

var FAMILLES_CIBLE={"2.1":"Achats de Médicaments","2.2":"Achats de Consommables pharmacie","2.3":"Achats de Matériel pharmacie","2.4":"Achats réactifs","2.5":"Restauration","2.6":"Prestations de services","2.7":"Eau & Électricité","2.8":"Autres Achats consommés","3.1":"Entretien-Réparation-Maintenance","3.2":"Communication","3.3":"Déplacement-Mission-Réception","3.4":"Honoraires","3.5":"Assurances","3.6":"Management Fees","3.7":"Autres Charges opérationnelles"};

var FAMILLES_ORDER_SAGE=FAMILLES_ORDER.filter(function(c){return !FAMILLES_EXCL_SAGE.has(c);});

function matchFamilleCode(t){if(!t)return null;var s=String(t).trim();var m=s.match(/^([23]\.\d)/);if(m&&FAMILLES_CIBLE[m[1]])return m[1];var lo=s.toLowerCase();for(var i=0;i<FAMILLES_ORDER.length;i++){var c=FAMILLES_ORDER[i];if(lo.indexOf(FAMILLES_CIBLE[c].toLowerCase())>=0)return c;}return null;}

var COL={demande:0,site:1,statutDA:2,nature:3,motifReg:4,creePar:5,dateCreation:6,dateLivrSouh:7,dateDebutValid:8,qteDemandee:9,qteValidee:10,dateValid1:11,validateur1:12,dateValid2:13,validateur2:14,dateValid3:15,validateur3:16,article:17,designation:18,qteCommandee:19,puOffre:20,puRemise:21,remise:22,tva:23,section:24,sousFamille:25,famille:26,codeCompta:27,bonCommande:28,devise:29,idLigneCmd:30,fournisseur:31,statutBC:32,acheteur:33,dateCreaBC:34,dateLivrPrev:35,dateValidBC:36,montantHT:37,montantTTC:38,montantOffre:39,valeurEcon:40,modalitePay:41,raisonSoc:42,ville:43,zone:44,alias:45,bonRecep:46,etatLivraison:47,etatConf:48,qteRecue:49,dateRecep:50,refExterne:51,facture:52,etatFacture:53,totalTTC:54,dateFacture:55,refExterne2:56,comptabilise:56,refComptable:57};
var COL_BUD={sitesCDG:0,sites:1,compte:2,compteCDG:3,description:4,libelle:5,postesPC:6,direction:7,mois:8,montant:9};
var COL_BUD_APP={sitesCDG:0,sites:1,compte:2,famille:3,section:4,compteCDG:5,description:6,libelle:7,postesPC:8,direction:9,mois:10,montant:11};
var COL_N1={site:0,compte:1,description:2,libelle:3,postePC:4,direction:5,janvier:6,fevrier:7,mars:8,avril:9,mai:10,juin:11,juillet:12,aout:13,septembre:14,octobre:15,novembre:16,decembre:17};
var COL_SAGE={codeSociete:0,journal:1,date:2,compteG:3,tiers:4,libelleTiers:5,libelleEcriture:6,debit:7,credit:8,solde:9,lettre:10,ecriture:11,nLot:12,nPiece:13,nPieceReconcil:13,reference:15,refPiece:16,societe:17};
var COL_ART={designation:0,statut:1,prestation:2,sousFamille:3,famille:4,unite:5,tauxTVA:6,immobilise:7,stockable:8,prixEditable:9,eligRetour:10,section:11,compteComptable:12,code:13};
var SAGE_ALLOWED_COMPTES=new Set();
var SITE_NORMALIZE={'CSS':'CCS','CCS':'CCS','CCSS':'CCS','CIMOG':'CIMO','CIMO':'CIMO','HPBM':'HPB','HPB':'HPB','HIIN':'HIIN','CIDB':'CIDB','CIDBM':'CIDB'};

function achSet(id,t){var e=document.getElementById(id);if(e)e.textContent=t;}
function achHTML(id,h){var e=document.getElementById(id);if(e)e.innerHTML=h;}
function pn(v){if(v==null||v==='')return 0;if(typeof v==='number')return isNaN(v)?0:v;var s=String(v).trim().replace(/\s/g,'').replace(',','.');var n=parseFloat(s);return isNaN(n)?0:n;}
function fmt(v){if(v==null||isNaN(v))return"0";return Math.round(v).toLocaleString('fr-FR');}
function fmtK(v){if(v==null||isNaN(v))return"0 K";return Math.round(v/1000).toLocaleString('fr-FR')+" K";}
function fmtDec(v,d){if(v==null||isNaN(v))return"0";return v.toLocaleString('fr-FR',{minimumFractionDigits:d||0,maximumFractionDigits:d||0});}
function pd(dv){if(!dv)return null;var d=null;if(dv instanceof Date)d=dv;else if(typeof dv==='string'){var m=dv.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);if(m){var y=parseInt(m[3]);if(y<100)y+=2000;d=new Date(y,parseInt(m[2])-1,parseInt(m[1]));}}else if(typeof dv==='number')d=new Date(dv);if(!d||isNaN(d.getTime()))return null;return d;}
function em(dv){var d=pd(dv);if(!d)return null;return{mois:ACHAT_MONTHS[d.getMonth()],annee:d.getFullYear()};}
function ns(s){if(!s)return"";var u=String(s).trim().toUpperCase();return SITE_NORMALIZE[u]||u;}
function db(d1,d2){var a=pd(d1);var b=pd(d2);if(!a||!b)return null;var diff=(b-a)/864e5;return diff>=0?diff:null;}
function fmtDate(d){if(!d)return'—';return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}
function getYTDMonths(){var mi=new Date().getMonth();var r=[];for(var i=0;i<=mi;i++)r.push(ACHAT_MONTHS[i]);return r;}
function kpi(label,value,color,sub){return'<div style="background:'+CLR.bg+';padding:12px 14px;border-radius:10px;border:1px solid '+CLR.border+';border-left:3px solid '+color+'"><div style="font-size:.67em;color:'+CLR.muted+';text-transform:uppercase;font-weight:700;letter-spacing:.3px">'+label+'</div><div style="font-size:1.08em;font-weight:800;color:'+color+';margin-top:4px">'+value+'</div>'+(sub?'<div style="font-size:.71em;color:'+CLR.muted+';margin-top:2px">'+sub+'</div>':'')+'</div>';}
function insight(taux,obj,conso,volet){var mi=new Date().getMonth();var pA=((mi+1)/12*100);var ecart=obj-conso;var t='';if(taux>100)t='🔴 Dépassement de '+fmt(Math.abs(ecart))+' MAD';else if(taux>pA*1.1)t='🟠 Rythme supérieur au calendrier ('+fmtDec(taux,0)+'% consommé vs '+fmtDec(pA,0)+'% de l\'année)';else if(taux<pA*0.7)t='🟢 Consommation maîtrisée';else t='🔵 Consommation conforme au calendrier';t+=' - Mois en cours : <strong>'+ACHAT_MONTHS_FR[mi]+'</strong> ('+fmtDec(pA,0)+'% de l\'année)';return'<div style="padding:10px 16px;background:'+CLR.bg+';border-radius:8px;border:1px solid '+CLR.border+';font-size:.88em;font-weight:600;color:'+CLR.slate+'">'+t+'</div>';}

// ===== CHARGEMENT =====
function loadAchatData(){
    achHTML('achatFilterDisplay','Chargement...');
    google.script.run.withSuccessHandler(function(r){if(!r){achHTML('achatFilterDisplay','Aucune réponse');return;}if(r.lastUpdate)achSet('achatFilterDisplay',"Dernière actualisation : "+r.lastUpdate);renderAchatDashboard(r);}).withFailureHandler(function(e){achHTML('achatFilterDisplay','Erreur : '+(e.message||e));}).getAchatData();
}

function nRow(r,aRef){
    var di=em(r[COL.dateCreation]);var mt=pn(r[COL.montantTTC]);
    var isV=/^valid[eé]$/i.test(String(r[COL.statutBC]||"").trim());
    var isE=String(r[COL.statutBC]||"").trim().toLowerCase()==='en validation';
    var dV1=pd(r[COL.dateValid1]),dV2=pd(r[COL.dateValid2]),dV3=pd(r[COL.dateValid3]);
    var vals=[dV1,dV2,dV3].filter(Boolean);
    var ref=String(r[COL.refComptable]||"").trim();
    return{demande:String(r[COL.demande]||"").trim(),idLigneCmd:String(r[COL.idLigneCmd]||"").trim(),site:ns(r[COL.site]),statutBC:String(r[COL.statutBC]||"").trim(),section:String(r[COL.section]||"").trim()||"Non défini",famille:String(r[COL.famille]||"").trim()||"Autres",codeCompta:String(r[COL.codeCompta]||"").trim(),refComptable:ref,compteGSage:null,compteFinal:null,bonCommande:String(r[COL.bonCommande]||"").trim(),article:String(r[COL.article]||"").trim(),fournisseur:String(r[COL.fournisseur]||"").trim()||"Non défini",designation:String(r[COL.designation]||"").trim(),montantTTC:mt,qteCommandee:pn(r[COL.qteCommandee]),puRemise:pn(r[COL.puRemise]),consommation:isV?mt:0,valeurEconomisee:pn(r[COL.valeurEcon]),montantOffre:pn(r[COL.montantOffre]),isValide:isV,isEngaged:isE,mois:di?di.mois:null,annee:di?di.annee:aRef,dateCreation:pd(r[COL.dateCreation]),dateCreaBC:pd(r[COL.dateCreaBC]),dateValidBC:pd(r[COL.dateValidBC]),lastValidation:vals.length>0?vals[vals.length-1]:null};
}

function renderAchatDashboard(resp){
    var A=new Date().getFullYear();
    var seen=new Set(),cl=[];(resp.data||[]).forEach(function(r){var id=String(r[COL.idLigneCmd]||"").trim();if(!id){cl.push(r);return;}if(seen.has(id))return;seen.add(id);cl.push(r);});
    globalAchatData=cl.map(function(r){return nRow(r,A);}).filter(function(r){return r.demande;});
    var s25=new Set(),c25=[];(resp.data2025||[]).forEach(function(r){var id=String(r[COL.idLigneCmd]||"").trim();if(!id){c25.push(r);return;}if(s25.has(id))return;s25.add(id);c25.push(r);});
    globalAchatData2025=c25.map(function(r){return nRow(r,2025);}).filter(function(r){return r.demande&&r.isValide&&r.annee===2025;});
    console.log("📋 2026: "+globalAchatData.length+" | 2025: "+globalAchatData2025.length);

    globalAchatBudget=(resp.budget||[]).map(function(r){var ms=String(r[COL_BUD.mois]||"").trim();var mi=ACHAT_MONTHS_FR.findIndex(function(m){return m.toLowerCase()===ms.toLowerCase();});return{site:ns(r[COL_BUD.sites]),compte:String(r[COL_BUD.compte]||"").trim(),description:String(r[COL_BUD.description]||"").trim(),libelle:String(r[COL_BUD.libelle]||"").trim(),mois:mi>=0?ACHAT_MONTHS[mi]:null,montant:pn(r[COL_BUD.montant])*1000,annee:A,direction:String(r[COL_BUD.direction]||"").trim(),postePC:String(r[COL_BUD.postesPC]||"").trim()};}).filter(function(b){return b.compte&&!/chiffre\s*d['\u2019]?\s*affaires?/i.test(b.direction);});

    globalBudgetApp=(resp.budgetApp||[]).map(function(r){var ms=String(r[COL_BUD_APP.mois]||"").trim();var mi=ACHAT_MONTHS_FR.findIndex(function(m){return m.toLowerCase()===ms.toLowerCase();});return{site:ns(r[COL_BUD_APP.sites]),compte:String(r[COL_BUD_APP.compte]||"").trim(),famille:String(r[COL_BUD_APP.famille]||"").trim(),section:String(r[COL_BUD_APP.section]||"").trim(),libelle:String(r[COL_BUD_APP.libelle]||"").trim(),mois:mi>=0?ACHAT_MONTHS[mi]:null,montant:pn(r[COL_BUD_APP.montant])*1000,annee:A};}).filter(function(b){return b.famille||b.section;});
    console.log("💰 Bud SAGE: "+globalAchatBudget.length+" | Bud APP: "+globalBudgetApp.length);

    globalConsoN1=[];(resp.consoN1||[]).forEach(function(r){var cpt=String(r[COL_N1.compte]||"").trim();if(!cpt)return;var site=ns(r[COL_N1.site]);[COL_N1.janvier,COL_N1.fevrier,COL_N1.mars,COL_N1.avril,COL_N1.mai,COL_N1.juin,COL_N1.juillet,COL_N1.aout,COL_N1.septembre,COL_N1.octobre,COL_N1.novembre,COL_N1.decembre].forEach(function(ci,i){var m=pn(r[ci]);if(m!==0)globalConsoN1.push({site:site,compte:cpt,mois:ACHAT_MONTHS[i],montant:m});});});

    window.globalCompteToFamCode={};window.globalCompteToLibelle={};
    globalAchatBudget.forEach(function(b){if(!window.globalCompteToFamCode[b.compte]){var code=matchFamilleCode(b.libelle)||matchFamilleCode(b.description);if(code){window.globalCompteToFamCode[b.compte]=code;window.globalCompteToLibelle[b.compte]=b.libelle;}}});
    SAGE_ALLOWED_COMPTES=new Set(Object.keys(window.globalCompteToFamCode));

    globalDataSage=[];var srm={};
    (resp.dataSage||[]).forEach(function(r){var cg=String(r[COL_SAGE.compteG]||"").trim();if(!cg)return;var site=ns(String(r[COL_SAGE.codeSociete]||"").trim());var solde=pn(r[COL_SAGE.solde]);var di=em(r[COL_SAGE.date]);var nPR=String(r[COL_SAGE.nPieceReconcil]||"").trim();if(nPR)srm[nPR]=cg;if(!SAGE_ALLOWED_COMPTES.has(cg)||solde===0)return;globalDataSage.push({site:site,compte:cg,solde:solde,famCode:window.globalCompteToFamCode[cg]||null,libelle:window.globalCompteToLibelle[cg]||'',mois:di?di.mois:null,annee:di?di.annee:null});});
    window._sageReconcilMap=srm;
    globalAchatData.forEach(function(d){if(d.refComptable){var cs=srm[d.refComptable];if(cs){d.compteGSage=cs;d.compteFinal=cs;}}});

    globalCodeArticle=(resp.codeArticle||[]).map(function(r){return{designation:String(r[COL_ART.designation]||"").trim(),famille:String(r[COL_ART.famille]||"").trim(),section:String(r[COL_ART.section]||"").trim(),code:String(r[COL_ART.code]||"").trim()};}).filter(function(a){return a.code;});
    console.log("📦 Articles: "+globalCodeArticle.length);
    populateAchatFilters();updateAchatView();
}

// ===== FILTRES (YTD par défaut sur Tab 1+2+3) =====
function populateAchatFilters(){
    var sSet=new Set();
    globalAchatBudget.forEach(function(b){sSet.add(b.site);});globalBudgetApp.forEach(function(b){sSet.add(b.site);});globalAchatData.forEach(function(d){sSet.add(d.site);});globalDataSage.forEach(function(s){sSet.add(s.site);});
    var sites=[...sSet].filter(Boolean).sort();
    ['achatFilterSite','calcFilterSite'].forEach(function(id){var s=document.getElementById(id);if(!s)return;s.innerHTML='<option value="">TOUT</option>';sites.forEach(function(v){s.add(new Option(v,v));});});
    if(typeof currentUserContext!=='undefined'&&currentUserContext&&currentUserContext.entity!=='ALL'){var fs=document.getElementById('achatFilterSite');if(fs)fs.value=currentUserContext.entity;}
    var familles=new Set();globalAchatData.forEach(function(d){if(d.famille&&d.famille!=='Autres')familles.add(d.famille);});
    var selFam=document.getElementById('achatFilterFamille');
    if(selFam){selFam.innerHTML='<option value="">TOUT</option>';[...familles].sort().forEach(function(f){selFam.add(new Option(f,f));});}
    updateAppSectionOptions();updateAppFournisseurOptions();updateAchatMonthOptions();
    ['achatFilterAnnee','calcFilterAnnee'].forEach(function(id){var s=document.getElementById(id);if(!s)return;s.innerHTML='';[new Date().getFullYear()].forEach(function(a){s.add(new Option(a,a));});});
    // Mois calc + filtres communs : YTD par défaut
    ['achatFilterMois','calcFilterMois'].forEach(function(id){
        var s=document.getElementById(id);if(!s)return;
        s.innerHTML='<option value="">YTD (Jan → mois en cours)</option>';
        ACHAT_MONTHS.forEach(function(m,i){s.add(new Option(ACHAT_MONTHS_FR[i],m));});
    });
}
function updateAppSectionOptions(){var fam=(document.getElementById('achatFilterFamille')||{}).value||"";var sel=document.getElementById('achatFilterSection');if(!sel)return;var old=sel.value;sel.innerHTML='<option value="">TOUT</option>';var secs=new Set();globalAchatData.forEach(function(d){if(fam&&d.famille!==fam)return;if(d.section&&d.section!=='Non défini')secs.add(d.section);});[...secs].sort().forEach(function(s){sel.add(new Option(s,s));});if(old&&[...sel.options].some(function(o){return o.value===old;}))sel.value=old;}
function updateAppFournisseurOptions(){var fam=(document.getElementById('achatFilterFamille')||{}).value||"";var sec=(document.getElementById('achatFilterSection')||{}).value||"";var sel=document.getElementById('achatFilterFournisseur');if(!sel)return;var old=sel.value;sel.innerHTML='<option value="">TOUT</option>';var frs=new Set();globalAchatData.forEach(function(d){if(fam&&d.famille!==fam)return;if(sec&&d.section!==sec)return;if(d.fournisseur&&d.fournisseur!=='Non défini')frs.add(d.fournisseur);});[...frs].sort().forEach(function(f){sel.add(new Option(f,f));});if(old&&[...sel.options].some(function(o){return o.value===old;}))sel.value=old;}
function updateAchatMonthOptions(){var trim=(document.getElementById('achatFilterTrim')||{}).value||"";var sel=document.getElementById('achatFilterMois');if(!sel)return;var old=sel.value;sel.innerHTML='<option value="">YTD (Jan → mois en cours)</option>';var ml=trim?ACHAT_QUARTERS[trim]:ACHAT_MONTHS;if(ml)ml.forEach(function(m,i){sel.add(new Option(m,m));});if(old&&[...sel.options].some(function(o){return o.value===old;}))sel.value=old;}

function getResolvedMonths(moisVal,trimVal){
    if(moisVal)return[moisVal];
    if(trimVal&&ACHAT_QUARTERS[trimVal])return ACHAT_QUARTERS[trimVal];
    return getYTDMonths();
}
function getCommonFilters(){
    var site=(document.getElementById('achatFilterSite')||{}).value||"";
    var annee=(document.getElementById('achatFilterAnnee')||{}).value||"";
    var trim=(document.getElementById('achatFilterTrim')||{}).value||"";
    var mois=(document.getElementById('achatFilterMois')||{}).value||"";
    return{site:site,annee:annee,trim:trim,mois:mois,moisList:getResolvedMonths(mois,trim)};
}
function getAppFilters(){var f=getCommonFilters();f.famille=(document.getElementById('achatFilterFamille')||{}).value||"";f.section=(document.getElementById('achatFilterSection')||{}).value||"";f.fournisseur=(document.getElementById('achatFilterFournisseur')||{}).value||"";return f;}

function filterBySTM(arr,f,sK,aK,mK){
    return arr.filter(function(d){if(f.site&&d[sK]!==f.site)return false;if(aK&&f.annee&&String(d[aK])!==String(f.annee))return false;if(d[mK]&&f.moisList.indexOf(d[mK])<0)return false;return true;});
}
function filterSageData(){return filterBySTM(globalDataSage,getCommonFilters(),'site','annee','mois');}
function filterN1ForSage(){return filterBySTM(globalConsoN1,getCommonFilters(),'site',null,'mois');}
function filterAppData(){var f=getAppFilters();return globalAchatData.filter(function(d){if(f.site&&d.site!==f.site)return false;if(f.annee&&String(d.annee)!==String(f.annee))return false;if(d.mois&&f.moisList.indexOf(d.mois)<0)return false;if(f.famille&&d.famille!==f.famille)return false;if(f.section&&d.section!==f.section)return false;if(f.fournisseur&&d.fournisseur!==f.fournisseur)return false;return true;});}
function filterApp2025Data(){var f=getAppFilters();return globalAchatData2025.filter(function(d){if(f.site&&d.site!==f.site)return false;if(f.famille&&d.famille!==f.famille)return false;if(f.section&&d.section!==f.section)return false;if(f.fournisseur&&d.fournisseur!==f.fournisseur)return false;if(d.mois&&f.moisList.indexOf(d.mois)<0)return false;return true;});}
function filterBudgetForSage(){return filterBySTM(globalAchatBudget,getCommonFilters(),'site','annee','mois');}
function filterBudgetForApp(){var f=getAppFilters();return globalBudgetApp.filter(function(b){if(f.site&&b.site!==f.site)return false;if(f.annee&&String(b.annee)!==String(f.annee))return false;if(b.mois&&f.moisList.indexOf(b.mois)<0)return false;if(f.famille&&b.famille!==f.famille)return false;if(f.section&&b.section!==f.section)return false;return true;});}

function setAchatTab(tab){
    achatActiveTab=tab;
    ['sage','app','calc'].forEach(function(t){var el=document.getElementById('achatContent'+t.charAt(0).toUpperCase()+t.slice(1));if(el)el.style.display=(t===tab)?'':'none';var btn=document.getElementById('btnTab'+t.charAt(0).toUpperCase()+t.slice(1));if(btn){btn.style.background=(t===tab)?'#1a202c':'#fff';btn.style.color=(t===tab)?'#fff':'#4a5568';btn.style.border=(t===tab)?'none':'1px solid #e2e8f0';btn.style.boxShadow=(t===tab)?'0 4px 6px rgba(0,0,0,.1)':'none';}});
    var af=document.getElementById('appExtraFilters');if(af)af.style.display=(tab==='app')?'':'none';
    updateAchatView();
}
function updateAchatView(){
    if(!globalAchatData||globalAchatData.length===0)return;
    var fc=getCommonFilters();
    if(achatActiveTab==='sage'){currentSageFiltered=filterSageData();currentBudgetFiltered=filterBudgetForSage();currentAchatFiltered=filterBySTM(globalAchatData,fc,'site','annee','mois');renderSageKPIs();renderSageChart();}

function renderSageKPIs(){
    var tB=currentBudgetFiltered.reduce(function(s,b){return s+b.montant;},0);
    var tS=currentSageFiltered.reduce(function(s,r){return s+r.solde;},0);
    var tE=currentAchatFiltered.filter(function(d){return d.isEngaged;}).reduce(function(s,d){return s+d.montantTTC;},0);
    var nE=currentAchatFiltered.filter(function(d){return d.isEngaged;}).length;
    var ecart=tB-tS-tE;var taux=tB>0?((tS+tE)/tB*100):0;
    achSet('sageKpiBudget',fmt(tB)+' MAD');achSet('sageKpiConso',fmt(tS)+' MAD');
    achSet('sageKpiConsoPct',(tB>0?fmtDec(tS/tB*100,1):0)+'% du budget');
    achSet('sageKpiEngage',fmt(tE)+' MAD');achSet('sageKpiEngageNb',fmtDec(nE,0));
    achSet('sageKpiEcart',fmt(ecart)+' MAD');achSet('sageKpiEcartPct',(tB>0?fmtDec(ecart/tB*100,1):0)+'% restant');
    achSet('sageKpiTaux',fmtDec(taux,1)+' %');
    var fill=document.getElementById('sageKpiTauxFill');if(fill){fill.style.width=Math.min(taux,100)+'%';fill.style.background=taux>100?CLR.rose:taux>85?CLR.engage:CLR.c2026;}
    var ie=document.getElementById('sageInsight');if(ie)ie.innerHTML=insight(taux,tB,tS+tE);
}

function renderSageChart(){
    var cToF=window.globalCompteToFamCode||{};var map={};
    FAMILLES_ORDER_SAGE.forEach(function(c){map[c]={key:c+' '+FAMILLES_CIBLE[c],code:c,budget:0,consoSage:0,engage:0,conso2026:0,conso2025:0,comptes:new Set()};});
    currentBudgetFiltered.forEach(function(b){var fc=cToF[b.compte];if(fc&&map[fc]){map[fc].budget+=b.montant;map[fc].comptes.add(b.compte);}});
    currentSageFiltered.forEach(function(s){var fc=cToF[s.compte];if(fc&&map[fc]){map[fc].consoSage+=s.solde;map[fc].comptes.add(s.compte);}});
    currentAchatFiltered.forEach(function(d){if(!d.isEngaged)return;var cpt=d.compteFinal||d.codeCompta;if(!cpt)return;var fc=cToF[cpt];if(fc&&map[fc])map[fc].engage+=d.montantTTC;});
    filterBySTM(globalConsoN1,getCommonFilters(),'site',null,'mois').forEach(function(n){var fc=cToF[n.compte];if(fc&&map[fc])map[fc].conso2025+=n.montant;});
    Object.values(map).forEach(function(r){r.conso2026=r.consoSage+r.engage;r.comptesArr=[...r.comptes];r.taux=r.budget>0?(r.conso2026/r.budget*100):0;});
    renderChartGrid('sageChartContainer',FAMILLES_ORDER_SAGE.map(function(c){return map[c];}),'sage');
}

function renderAppKPIs(){
    var tB=currentBudgetFiltered.reduce(function(s,b){return s+b.montant;},0);
    var tC=currentAchatFiltered.filter(function(d){return d.isValide;}).reduce(function(s,d){return s+d.montantTTC;},0);
    var tE=currentAchatFiltered.filter(function(d){return d.isEngaged;}).reduce(function(s,d){return s+d.montantTTC;},0);
    var nE=currentAchatFiltered.filter(function(d){return d.isEngaged;}).length;
    var t25=currentAchat2025Filtered.reduce(function(s,d){return s+d.consommation;},0);

    var variation=t25>0?((tC-t25)/t25*100):null;
    var variTxt=variation==null?'—':(variation>0?'+':'')+fmtDec(variation,1)+' %';
    var variCol=variation==null?CLR.muted:(variation>0?CLR.rose:CLR.emerald);

    // KPIs opérationnels (en haut)
    var dDA=currentAchatFiltered.filter(function(d){return d.dateCreation&&d.dateValidBC&&d.montantTTC>0;}).map(function(d){return db(d.dateCreation,d.dateValidBC);}).filter(function(v){return v!=null&&v>=0;});
    achSet('appKpiDelaiDA',dDA.length>0?fmtDec(dDA.reduce(function(a,b){return a+b;},0)/dDA.length,1)+' j':'—');
    var dAch=currentAchatFiltered.filter(function(d){return d.lastValidation&&d.dateCreaBC&&d.montantTTC>0;}).map(function(d){return db(d.lastValidation,d.dateCreaBC);}).filter(function(v){return v!=null&&v>=0;});
    achSet('appKpiDelaiAcheteur',dAch.length>0?fmtDec(dAch.reduce(function(a,b){return a+b;},0)/dAch.length,1)+' j':'—');
    var dBC=currentAchatFiltered.filter(function(d){return d.dateCreaBC&&d.dateValidBC;}).map(function(d){return db(d.dateCreaBC,d.dateValidBC);}).filter(function(v){return v!=null&&v>=0;});
    achSet('appKpiDelaiBC',dBC.length>0?fmtDec(dBC.reduce(function(a,b){return a+b;},0)/dBC.length,1)+' j':'—');
    var totSav=currentAchatFiltered.filter(function(d){return d.isValide&&d.valeurEconomisee>0;}).reduce(function(s,d){return s+d.valeurEconomisee;},0);
    var totOffre=currentAchatFiltered.filter(function(d){return d.isValide&&d.montantOffre>0;}).reduce(function(s,d){return s+d.montantOffre;},0);
    var pctSav=totOffre>0?(totSav/totOffre*100):0;
    achSet('appKpiSaving',fmt(totSav)+' MAD');
    achSet('appKpiSavingPct',fmtDec(pctSav,1)+'% d\'économie');

    // KPIs financiers (en bas)
    achSet('appKpiObj',fmt(tB)+' MAD');
    achSet('appKpiConso',fmt(tC)+' MAD');
    achSet('appKpiEngage',fmt(tE)+' MAD');achSet('appKpiEngageNb',fmtDec(nE,0));
    achSet('appKpiConso25',fmt(t25)+' MAD');
    achSet('appKpiVariation',variTxt);
    var variEl=document.getElementById('appKpiVariation');if(variEl)variEl.style.color=variCol;
    achSet('appKpiVariationSub',variMnt);
    achSet('appKpiEcart',fmt(ecart)+' MAD');achSet('appKpiEcartPct',fmtDec(taux,1)+'% consommé');
    achSet('appKpiTaux',fmtDec(taux,1)+' %');
    var fill=document.getElementById('appKpiTauxFill');if(fill){fill.style.width=Math.min(taux,100)+'%';fill.style.background=taux>100?CLR.rose:taux>85?CLR.engage:CLR.c2026;}

function renderAppTop10(){
    var fMap={};

    currentAchat2025Filtered.forEach(function(d){if(!fMap[d.fournisseur])fMap[d.fournisseur]={nom:d.fournisseur,total:0,t25:0,count:0,valide:0,engage:0};fMap[d.fournisseur].t25+=d.consommation;});
    var all=Object.values(fMap).sort(function(a,b){return b.total-a.total;});
    var top=appTop10Mode==='top10'?all.slice(0,10):all;
    window._top10Data=all;
    var maxF=all.length>0?all[0].total:1;
    var colors=['#5a67d8','#805ad5','#319795','#dd6b20','#d69e2e','#38a169','#e53e3e','#3182ce','#ed64a6','#4fd1c5'];
    var h='';
    achSet('topFournCount',all.length+' fournisseur(s)');
    top.forEach(function(f,i){
        var p=(f.total/maxF*100);var col=colors[i%colors.length];
        var ev=f.t25>0?((f.total-f.t25)/f.t25*100):null;
        var evT=ev==null?'':(ev>0?'↑':'↓')+Math.abs(ev).toFixed(0)+'%';
        var evC=ev==null?CLR.muted:(ev>0?CLR.rose:CLR.emerald);
        h+='<div onclick="openFournisseurModal('+i+')" style="display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid #f7fafc;cursor:pointer;border-radius:6px;transition:all .15s" onmouseover="this.style.background=\'#f7fafc\';this.style.transform=\'translateX(3px)\'" onmouseout="this.style.background=\'transparent\';this.style.transform=\'translateX(0)\'">';
        h+='<div style="background:'+col+';color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.78em;flex-shrink:0">'+(i+1)+'</div>';
        h+='<div style="flex:1;min-width:0"><div style="font-weight:700;color:'+CLR.ink+';font-size:.84em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+f.nom+'</div>';
        h+='<div style="height:5px;background:#edf2f7;border-radius:3px;margin:6px 0"><div style="height:100%;width:'+p+'%;background:'+col+';border-radius:3px"></div></div>';

function runCalculator(){
    var art=window._calcArticle||null;
    var cS=(document.getElementById('calcFilterSite')||{}).value||"";
    var cM=(document.getElementById('calcFilterMois')||{}).value||"";
    var montBC=pn((document.getElementById('calcMontantBC')||{}).value);
    if(!art){achHTML('calcResultat','<div style="text-align:center;padding:40px;border:2px dashed '+CLR.border+';border-radius:12px"><div style="font-size:2.5em;margin-bottom:12px">🔍</div><div style="color:'+CLR.muted+';font-weight:600;font-size:1.05em">Recherchez un article par son code ou sa désignation</div><div style="color:'+CLR.border+';font-size:.85em;margin-top:6px">Les résultats s\'afficheront automatiquement</div></div>');achHTML('calcDetailTable','');return;}
    var fam=art.famille,sec=art.section;
    var moisAut=cM?[cM]:getYTDMonths();

    var budT=globalBudgetApp.filter(function(b){if(b.famille!==fam)return false;if(sec&&b.section!==sec)return false;if(cS&&b.site!==cS)return false;if(moisAut.indexOf(b.mois)<0)return false;return true;}).reduce(function(s,b){return s+b.montant;},0);
    var cLines=globalAchatData.filter(function(d){if(!d.isValide)return false;if(d.famille!==fam)return false;if(sec&&d.section!==sec)return false;if(cS&&d.site!==cS)return false;if(moisAut.indexOf(d.mois)<0)return false;return true;});
    var consoT=cLines.reduce(function(s,d){return s+d.montantTTC;},0);
    var eLines=globalAchatData.filter(function(d){if(!d.isEngaged)return false;if(d.famille!==fam)return false;if(sec&&d.section!==sec)return false;if(cS&&d.site!==cS)return false;if(moisAut.indexOf(d.mois)<0)return false;return true;});
    var engT=eLines.reduce(function(s,d){return s+d.montantTTC;},0);
    var c25Lines=globalAchatData2025.filter(function(d){if(d.famille!==fam)return false;if(sec&&d.section!==sec)return false;if(cS&&d.site!==cS)return false;if(moisAut.indexOf(d.mois)<0)return false;return true;});
    var c25=c25Lines.reduce(function(s,d){return s+d.consommation;},0);

    var dispo=budT-consoT-engT;var apres=dispo-montBC;
    var taux=budT>0?((consoT+engT)/budT*100):0;var tauxA=budT>0?((consoT+engT+montBC)/budT*100):0;
    var isOk=montBC<=dispo;
    var ctx=fam+(sec?' · '+sec:'')+(cS?' · '+cS:'');
    var prd=cM?cM:'YTD (Jan→'+ACHAT_MONTHS_FR[new Date().getMonth()]+')';

    var h='';
    // Insight
    h+=insight(taux,budT,consoT+engT);h+='<div style="height:14px"></div>';
    // KPIs
    h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:12px">';
    h+=kpi('Objectif',fmt(budT)+' MAD',CLR.budget,ctx);
    h+=kpi('Conso 2026'+(engT>0?' + Engagé':''),fmt(consoT)+' MAD'+(engT>0?' <span style="color:'+CLR.engage+';font-size:.85em">+ '+fmt(engT)+'</span>':''),CLR.c2026,cLines.length+' BC'+(eLines.length>0?' + '+eLines.length+' eng.':''));
    h+=kpi('Conso 2025',fmt(c25)+' MAD',CLR.c2025,c25Lines.length+' BC · '+prd);
    h+='</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px">';
    h+=kpi('Disponible avant BC',fmt(dispo)+' MAD',dispo<0?CLR.rose:CLR.blue,fmtDec(taux,1)+'% consommé');
    if(montBC>0)h+=kpi('Reste après BC',fmt(apres)+' MAD',apres<0?CLR.rose:CLR.emerald,fmtDec(tauxA,1)+'% consommé');
    else h+=kpi('Reste après BC','Saisissez un montant',CLR.muted,'');
    h+='</div>';
    if(montBC>0&&tauxA>100)h+='<div style="padding:14px 18px;background:linear-gradient(135deg,#fff5f5,#fed7d7);border:1px solid '+CLR.rose+';border-radius:10px;color:'+CLR.rose+';font-weight:700;font-size:.9em;margin-bottom:16px;display:flex;align-items:center;gap:10px"><span style="font-size:1.5em">⚠️</span><span>Dépassement de '+fmt(Math.abs(apres))+' MAD ('+(tauxA-100).toFixed(1)+'%)</span></div>';
    else if(montBC>0&&tauxA>85)h+='<div style="padding:14px 18px;background:linear-gradient(135deg,#fffaf0,#fefcbf);border:1px solid '+CLR.engage+';border-radius:10px;color:'+CLR.engage+';font-weight:700;font-size:.9em;margin-bottom:16px;display:flex;align-items:center;gap:10px"><span style="font-size:1.5em">🟠</span><span>Consommation à '+fmtDec(tauxA,1)+'% de l\'objectif</span></div>';
    else if(montBC>0&&isOk)h+='<div style="padding:14px 18px;background:linear-gradient(135deg,#f0fff4,#c6f6d5);border:1px solid '+CLR.emerald+';border-radius:10px;color:'+CLR.emerald+';font-weight:700;font-size:.9em;margin-bottom:16px;display:flex;align-items:center;gap:10px"><span style="font-size:1.5em">✅</span><span>Disponible — '+fmt(apres)+' MAD restants</span></div>';
    achHTML('calcResultat',h);

    // Tableau détail enrichi

    var tb='';
    if(allL.length>0){
        tb+='<div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.03);border:1px solid '+CLR.border+';margin-top:20px">';
        tb+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-weight:800;color:'+CLR.ink+';font-size:1em">📋 Détail des opérations <span style="color:'+CLR.muted+';font-weight:600;font-size:.85em">('+allL.length+')</span></div></div>';
        tb+='<div style="max-height:450px;overflow-y:auto;border:1px solid '+CLR.border+';border-radius:10px"><table style="width:100%;border-collapse:collapse;font-size:.82em"><thead style="background:linear-gradient(180deg,#f7fafc,#edf2f7);position:sticky;top:0;z-index:1"><tr>';
        tb+='<th style="padding:10px 8px;text-align:left;color:'+CLR.slate+';font-weight:700">Site</th>';
        tb+='<th style="padding:10px 8px;text-align:left;color:'+CLR.slate+';font-weight:700">Code</th>';
        tb+='<th style="padding:10px 8px;text-align:left;color:'+CLR.slate+';font-weight:700">Désignation</th>';
        tb+='<th style="padding:10px 8px;text-align:left;color:'+CLR.slate+';font-weight:700">Famille</th>';
        tb+='<th style="padding:10px 8px;text-align:left;color:'+CLR.slate+';font-weight:700">Section</th>';
        tb+='<th style="padding:10px 8px;text-align:center;color:'+CLR.slate+';font-weight:700">Date</th>';
        tb+='<th style="padding:10px 8px;text-align:right;color:'+CLR.slate+';font-weight:700">Qté</th>';
        tb+='<th style="padding:10px 8px;text-align:right;color:'+CLR.slate+';font-weight:700">PU</th>';
        tb+='<th style="padding:10px 8px;text-align:right;color:'+CLR.slate+';font-weight:700">Montant TTC</th>';
        tb+='<th style="padding:10px 8px;text-align:center;color:'+CLR.slate+';font-weight:700">Statut</th>';
        tb+='</tr></thead><tbody>';
        allL.forEach(function(d,i){
            var sc=d.isValide?CLR.c2026:CLR.engage;var st=d.isValide?'Validé':'Engagé';
            var bg=i%2===0?'#fff':'#fafbfc';
            tb+='<tr style="background:'+bg+';border-bottom:1px solid '+CLR.border+';transition:background .1s" onmouseover="this.style.background=\'#f0f9ff\'" onmouseout="this.style.background=\''+bg+'\'">';
            tb+='<td style="padding:8px;font-weight:700;color:'+CLR.ink+'">'+d.site+'</td>';
            tb+='<td style="padding:8px"><span style="background:'+CLR.indigo+'12;color:'+CLR.indigo+';padding:3px 8px;border-radius:5px;font-family:monospace;font-weight:700;font-size:.9em">'+d.article+'</span></td>';
            tb+='<td style="padding:8px;color:'+CLR.slate+';max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+d.designation+'</td>';
            tb+='<td style="padding:8px;color:'+CLR.muted+';font-size:.9em">'+d.famille+'</td>';
            tb+='<td style="padding:8px;color:'+CLR.muted+';font-size:.88em;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+d.section+'</td>';
            tb+='<td style="padding:8px;text-align:center;color:'+CLR.slate+';font-size:.88em">'+fmtDate(d.dateCreation)+'</td>';
            tb+='<td style="padding:8px;text-align:right;font-weight:700;color:'+CLR.ink+'">'+fmt(d.qteCommandee)+'</td>';
            tb+='<td style="padding:8px;text-align:right;color:'+CLR.slate+'">'+fmt(d.puRemise)+'</td>';
            tb+='<td style="padding:8px;text-align:right;font-weight:800;color:'+CLR.ink+'">'+fmt(d.montantTTC)+'</td>';
            tb+='<td style="padding:8px;text-align:center"><span style="background:'+sc+'15;color:'+sc+';padding:3px 10px;border-radius:6px;font-weight:700;font-size:.85em">'+st+'</span></td></tr>';
        });
        tb+='</tbody></table></div></div>';
    }else{
        tb='<div style="text-align:center;color:'+CLR.muted+';padding:30px;margin-top:20px;font-weight:600;border:2px dashed '+CLR.border+';border-radius:12px">Aucune opération trouvée</div>';
    }
    achHTML('calcDetailTable',tb);
}

function closeAchatDetailModal(e){if(e&&e.target&&e.target.id!=='achatDetailModal')return;document.getElementById('achatDetailModal').style.display='none';}
function exportModalExcel(){if(!currentModalRows||!currentModalRows.length){alert('Aucune donnée.');return;}if(typeof XLSX==='undefined'){alert('XLSX non chargé.');return;}var data=currentModalRows.map(function(l){return{'Site':l.site,'BC':l.bonCommande,'Fournisseur':l.fournisseur,'Désignation':l.designation,'Famille':l.famille,'Section':l.section,'Montant TTC':l.montantTTC};});var ws=XLSX.utils.json_to_sheet(data);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Détail');XLSX.writeFile(wb,'detail_'+currentModalTitle+'.xlsx');}
function exportModalPDF(){if(typeof html2canvas==='undefined'){alert('html2canvas non chargé.');return;}var content=document.getElementById('modalContent');if(!content)return;html2canvas(content,{scale:2}).then(function(canvas){if(typeof jspdf==='undefined'&&typeof jsPDF==='undefined'){alert('jsPDF non chargé.');return;}var J=(typeof jspdf!=='undefined')?jspdf.jsPDF:jsPDF;var pdf=new J('l','mm','a4');var img=canvas.toDataURL('image/png');var w=pdf.internal.pageSize.getWidth()-20;var h=canvas.height*w/canvas.width;pdf.addImage(img,'PNG',10,10,w,h);pdf.save('detail_'+currentModalTitle+'.pdf');});}
</script>
